[workspace]
resolver = "3"
members = [
    "crates/core",
    "crates/discovery",
    "crates/envoy",
    "crates/gossip",
    "crates/bin",
    "crates/nginx",
]

[workspace.package]
version = "0.1.0"
edition = "2024"

[workspace.dependencies]
axum = "0.8"
envoy-types = "0.7"
futures = "0.3"
gabion-core = { path = "crates/core" }
gabion-discovery = { path = "crates/discovery" }
gabion-envoy = { path = "crates/envoy" }
gabion-gossip = { path = "crates/gossip" }
hmac = "0.12"
k8s-openapi = { version = "0.26", features = ["v1_34"] }
kube = { version = "2", features = ["client", "runtime"] }
nginx-sys = { version = "0.5", default-features = false }
ngx = { version = "0.5", default-features = false, features = ["std"] }
quickcheck = "1"
quickcheck_macros = "1"
serde = { version = "1", features = ["derive"] }
serde_yaml = "0.9"
sha2 = "0.10"
thiserror = "2"
tokio = { version = "1", features = ["macros", "net", "rt-multi-thread", "signal", "sync", "test-util"] }
tonic = "0.14"

[profile.release]
lto = "fat"
codegen-units = 1
