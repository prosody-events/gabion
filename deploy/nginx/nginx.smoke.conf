worker_processes 2;
error_log /dev/stderr info;

events {
    worker_connections 128;
}

http {
    gabion_limit_zone zone=api:128m;
    gabion_limit_rule uri_api    $uri                            rate=2r/m bucket=1s;
    gabion_limit_rule ip_api     $remote_addr                    rate=2r/m bucket=1s;
    gabion_limit_rule tenant_api tenant:$arg_tenant path:$uri    rate=1r/m bucket=1s;

    # Demonstrate the three new primitives in one stack:
    #   - per-IP rule, except_if-bypassed for trusted sources
    #   - per-UA-class rule, mapped through nginx `map` to control
    #     cardinality
    #   - dry_run rule that records hits without rejecting
    geo $trusted_ip {
        default 0;
        127.0.0.1/32 1;
    }
    map $http_user_agent $bot_class {
        default      other;
        ~*Googlebot  google;
        ~*bingbot    ms;
    }
    gabion_limit_rule per_ip_stacked     ip:$remote_addr    rate=2r/m bucket=1s except_if=$trusted_ip;
    gabion_limit_rule per_bot_stacked    class:$bot_class   rate=5r/m bucket=1s;
    gabion_limit_rule shadow_canary      $uri               rate=1r/s bucket=1s dry_run;

    # Baseline rule applied at the http {} level so locations without their
    # own `gabion_limit` inherit it (nginx limit_req-style merge semantics).
    gabion_limit_rule baseline_rule      $uri               rate=3r/m bucket=1s;
    gabion_limit baseline_rule;

    # Demo of the explicit `window=` specifier: `rate=2r/m window=2m`
    # scales to a 4-over-2-minute budget enforced in 30s buckets. The
    # smoke test asserts the directive parses; the rule is declared but
    # not applied to any location so it does not move other counters.
    gabion_limit_rule window_demo       demo:$arg_demo     rate=2r/m window=2m bucket=30s;

    gabion_gossip_bind 0.0.0.0:9000;
    gabion_gossip_cluster 1;
    gabion_gossip_fanout 8;
    # No `gabion_discovery_namespace_allow` directive: the adapter falls
    # back to the pod's own namespace (read from the auto-mounted
    # ServiceAccount file). The previous explicit `default` value caused
    # 403 spam in ephemeral test namespaces whose RBAC binding only
    # granted access to their own namespace, not `default`.

    server {
        listen 8080;

        location /api/ {
            gabion_limit uri_api;
            alias /usr/share/nginx/html/;
        }

        location /ip/ {
            gabion_limit ip_api;
            alias /usr/share/nginx/html/;
        }

        location /tenant/ {
            gabion_limit tenant_api;
            alias /usr/share/nginx/html/;
        }

        location /off/ {
            gabion_limit uri_api;
            gabion off;
            alias /usr/share/nginx/html/;
        }

        # Stacked primitives: per-IP (except_if'd by trusted source) +
        # per-UA-class (capped at 5r/m) + dry_run shadow.
        location /stacked/ {
            gabion_limit per_ip_stacked per_bot_stacked shadow_canary;
            alias /usr/share/nginx/html/;
        }

        # Inherits the http-level `gabion_limit baseline_rule;` because no
        # `gabion_limit` directive is declared locally.
        location /inherits/ {
            alias /usr/share/nginx/html/;
        }

        # `gabion_limit other_rule;` REPLACES the http-level baseline at
        # this location (matches nginx's `limit_req` inheritance shape).
        location /overrides/ {
            gabion_limit uri_api;
            alias /usr/share/nginx/html/;
        }
    }
}
