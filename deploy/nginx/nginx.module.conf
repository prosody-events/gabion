load_module /etc/nginx/modules/ngx_http_gabion_module.so;

worker_processes 2;
error_log /dev/stderr info;

events {
    worker_connections 128;
}

http {
    gabion_limit_zone api 128m;
    gabion_limit_rule uri_api 2r/m key=$uri window=60s bucket=1s;
    gabion_limit_rule ip_api 2r/m key=$remote_addr window=60s bucket=1s;
    gabion_limit_rule tenant_api 1r/m key=tenant:$arg_tenant key=path:$uri window=60s bucket=1s;
    gabion_gossip_bind 0.0.0.0:9000;
    gabion_gossip_cluster 1;
    gabion_gossip_fanout 8;
    # No `gabion_gossip_discovery_namespace` directive: the adapter falls
    # back to the pod's own namespace (read from the auto-mounted
    # ServiceAccount file). The previous explicit `default` value caused
    # 403 spam in ephemeral test namespaces whose RBAC binding only
    # granted access to their own namespace, not `default`.

    server {
        listen 8080;

        location /api/ {
            gabion_limit uri_api;
            alias /usr/share/nginx/html/;
        }

        location /ip/ {
            gabion_limit ip_api;
            alias /usr/share/nginx/html/;
        }

        location /tenant/ {
            gabion_limit tenant_api;
            alias /usr/share/nginx/html/;
        }

        location /off/ {
            gabion_limit uri_api;
            gabion off;
            alias /usr/share/nginx/html/;
        }
    }
}
