load_module /etc/nginx/modules/ngx_http_gabion_module.so;

worker_processes 1;

events {
    worker_connections 128;
}

http {
    gossip_limit_zone api 128m;
    gossip_limit_rule tenant_api 2r/m;

    server {
        listen 8080;

        location /api/ {
            gossip_limit tenant_api;
            alias /usr/share/nginx/html/;
        }
    }
}
