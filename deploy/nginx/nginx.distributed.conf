# Config for the distributed rate-limit test
# (deploy/kubernetes/distributed-rate-limit.sh). Mounted over the
# image's baked-in /etc/nginx/nginx.conf via a ConfigMap so we can vary the
# rule budget per test run without rebuilding the image.
#
# The rule below is keyed on `$arg_tenant` and tuned so the test can drive
# meaningful overload across many keys: 100 distinct tenants × per-tenant
# budget gives a cluster-wide expected-allowed rate that's high enough to
# see gossip catch up, low enough to leave a measurable rejected tail.

load_module /etc/nginx/modules/ngx_http_gabion_module.so;

worker_processes 2;
error_log /dev/stderr info;

events {
    worker_connections 1024;
}

http {
    gabion_limit_zone api 128m;

    # Per-tenant cluster-wide fixed-window budget.
    gabion_limit_rule tenant_dist 20r/s key=tenant:$arg_tenant window=1s bucket=1s;

    gabion_gossip_bind 0.0.0.0:9000;
    gabion_gossip_cluster 1;
    gabion_gossip_fanout 8;

    # Tighter keep-alive than the default so the in-cluster loader can
    # reuse connections at the RPS the test drives.
    keepalive_requests 10000;
    keepalive_timeout 60s;

    server {
        listen 8080;

        location /tenant/ {
            gabion_limit tenant_dist;
            alias /usr/share/nginx/html/;
        }
    }
}
