name: nginx

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: nginx-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# `packages: read` lets the smoke jobs pull the private GHCR buildcache as
# a read-only `cache-from` source. Fork PRs' GITHUB_TOKEN can't read
# packages — their cache-from import misses and the build falls back to a
# cold compile (today's behavior).
permissions:
  contents: read
  packages: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_PROFILE_TEST_DEBUG: 0

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      nginx-smoke: ${{ steps.surfaces.outputs.nginx_smoke }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: loadingalias/cargo-rail-action@v4
        id: rail
        with:
          mode: minimal
      # cargo-rail-action v4.1.3 doesn't expose `custom_<name>` outputs;
      # parse them out of `scope-json` directly.
      - id: surfaces
        env:
          SCOPE_JSON: ${{ steps.rail.outputs.scope-json }}
        run: |
          set -eu
          val=$(printf '%s' "$SCOPE_JSON" | jq -r '.surfaces["custom:nginx_smoke"] // false')
          echo "nginx_smoke=$val" >> "$GITHUB_OUTPUT"

  nginx-config:
    needs: plan
    if: needs.plan.outputs.nginx-smoke == 'true' || github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # No buildx here: `make nginx-config` only runs `nginx -t` against
      # the stock `nginx:stable-alpine` image — it builds nothing.
      - name: nginx-config smoke
        run: make nginx-config

  nginx-module:
    needs: plan
    if: needs.plan.outputs.nginx-smoke == 'true' || github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
        with:
          driver-opts: image=moby/buildkit:latest
      # Best-effort login so the buildx `cache-from` below can read the
      # private GHCR buildcache. Fork PRs lack packages access — the login
      # fails, the import misses, and the build cold-compiles (today's
      # behavior). `continue-on-error` keeps that path green.
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        continue-on-error: true
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # Route the host kernel's core dumps into /tmp/cores so the
      # smoke container (bind-mounted at /tmp/cores:/tmp/cores) and the
      # workflow's artifact upload below can pick them up. GHA's
      # ubuntu-latest defaults `kernel.core_pattern` to apport, which
      # stashes cores in an unreadable path. The container path
      # resolves against the dumping process's filesystem root, so the
      # bind mount makes host and container see the same file.
      - name: enable host core dumps
        run: |
          sudo mkdir -p /tmp/cores
          sudo chmod 1777 /tmp/cores
          sudo sysctl -w kernel.core_pattern='/tmp/cores/core.%e.%p'
      # Pre-build the `target: smoke` image with the canonical `build`-job
      # cook layer as a read-only registry cache, then `--load` it into the
      # docker image store under the `<project>-<service>` name compose
      # expects. The smoke run below (NGINX_SMOKE_BUILD empty → no
      # `--build`) consumes it instead of cold-compiling gabion-nginx.
      # cache-from is read-only — a miss degrades to today's cold build.
      - name: warm smoke image from registry cache
        run: |
          docker buildx build \
            --load \
            --target smoke \
            --build-arg NGINX_BASE_IMAGE=nginx:stable-alpine \
            --cache-from type=registry,ref=ghcr.io/${{ github.repository }}/nginx:buildcache-nginx-stable-alpine-amd64 \
            -f deploy/nginx/Dockerfile \
            -t nginx-nginx-module-smoke:latest \
            .
      - name: nginx-module smoke
        env:
          DOCKER_BUILDKIT: '1'
          COMPOSE_DOCKER_CLI_BUILD: '1'
          NGINX_SMOKE_BUILD: ''
        run: make nginx-module
      # Cores are written by root inside the container so the runner
      # user can't open them for read. `sudo chmod` fixes the perms
      # before upload-artifact zips the directory.
      - name: relax core perms for upload
        if: failure()
        run: sudo chmod -R a+r /tmp/cores 2>/dev/null || true
      - name: upload cores on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cores-${{ github.job }}-${{ github.run_attempt }}
          path: /tmp/cores
          if-no-files-found: ignore

  nginx-test:
    needs: plan
    if: needs.plan.outputs.nginx-smoke == 'true' || github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
        with:
          driver-opts: image=moby/buildkit:latest
      # Best-effort login — see nginx-module. Forks miss and cold-compile.
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        continue-on-error: true
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: enable host core dumps
        run: |
          sudo mkdir -p /tmp/cores
          sudo chmod 1777 /tmp/cores
          sudo sysctl -w kernel.core_pattern='/tmp/cores/core.%e.%p'
      # Warm the `target: smoke` image from the canonical build cache, then
      # run without `--build` (see nginx-module). Same image, different
      # command — the request smoke asserts 200, 200, 429.
      - name: warm smoke image from registry cache
        run: |
          docker buildx build \
            --load \
            --target smoke \
            --build-arg NGINX_BASE_IMAGE=nginx:stable-alpine \
            --cache-from type=registry,ref=ghcr.io/${{ github.repository }}/nginx:buildcache-nginx-stable-alpine-amd64 \
            -f deploy/nginx/Dockerfile \
            -t nginx-nginx-module-request-smoke:latest \
            .
      - name: nginx-test smoke
        env:
          DOCKER_BUILDKIT: '1'
          COMPOSE_DOCKER_CLI_BUILD: '1'
          NGINX_SMOKE_BUILD: ''
        run: make nginx-test
      # Cores are written by root inside the container so the runner
      # user can't open them for read. `sudo chmod` fixes the perms
      # before upload-artifact zips the directory.
      - name: relax core perms for upload
        if: failure()
        run: sudo chmod -R a+r /tmp/cores 2>/dev/null || true
      - name: upload cores on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cores-${{ github.job }}-${{ github.run_attempt }}
          path: /tmp/cores
          if-no-files-found: ignore
