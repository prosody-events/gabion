name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      # Mint a GitHub App installation token so release-please's tag (and
      # release PR) are pushed by the App, not GITHUB_TOKEN. A tag pushed
      # with GITHUB_TOKEN does NOT trigger workflows — GitHub's recursion
      # guard — so `docker.yml`'s `on: push: tags: ['v*']` never fired and
      # releases shipped a tag + GitHub release but no release-tagged
      # images (`:vX.Y.Z`, `:latest`, `:X`, `:X.Y`, provenance/SBOM). An
      # App token is a real identity, so its tag push triggers that build.
      #
      # Setup (one-time, before merging this): create a GitHub App,
      # install it on this repo with `contents: write` + `pull-requests:
      # write`, and add two repo secrets — RELEASE_PLEASE_APP_ID and
      # RELEASE_PLEASE_APP_PRIVATE_KEY.
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.RELEASE_PLEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_PLEASE_APP_PRIVATE_KEY }}

      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # release-please's `simple` release-type bumps
      # `workspace.package.version` in Cargo.toml via the TOML jsonpath
      # extra-file, but knows nothing about Cargo.lock. Without this
      # step, the merged release commit ships a stale lockfile (every
      # workspace crate's `[[package]] version = "..."` entry still
      # carries the prior version) and the first local `cargo build`
      # after release produces a spurious N-crate version diff.
      #
      # Check out the release PR branch, run `cargo update --workspace`
      # to refresh only workspace-member entries in Cargo.lock (without
      # touching external deps), and push the result back to the PR
      # branch as a follow-up commit. release-please rewrites its PR
      # branch on subsequent runs; that's fine — this step runs again
      # and re-adds the Cargo.lock commit before the PR is merged.
      # Checkout main (the trusted, just-pushed SHA) — no `ref:` derived
      # from `steps.release.outputs.pr` so CodeQL's "untrusted-checkout"
      # heuristic stays satisfied. The next step fetches and checks out
      # the release-please branch from the same trusted remote.
      - uses: actions/checkout@v6
        if: ${{ steps.release.outputs.pr }}
        with:
          # Persist the App token so the Cargo.lock follow-up commit is
          # pushed by the App too — keeps the whole release flow on one
          # identity and lets that push trigger the PR's checks.
          token: ${{ steps.app-token.outputs.token }}

      - name: Sync Cargo.lock in the release PR
        if: ${{ steps.release.outputs.pr }}
        env:
          PR: ${{ steps.release.outputs.pr }}
        run: |
          set -eu
          branch=$(printf '%s' "$PR" | jq -r .headBranchName)
          if [ -z "$branch" ] || [ "$branch" = "null" ]; then
            echo "No release PR branch resolved; nothing to sync." >&2
            exit 0
          fi
          git fetch origin "$branch":"$branch"
          git checkout "$branch"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          cargo update --workspace
          if git diff --quiet -- Cargo.lock; then
            echo "Cargo.lock already in sync." >&2
            exit 0
          fi
          git add Cargo.lock
          git commit -m "chore: sync Cargo.lock to workspace.package.version"
          git push origin "$branch"
        shell: bash
