name: kubernetes

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    # Weekly kind-cluster smoke on main. The k8s code paths
    # (`crates/gabion/src/discovery/kubernetes.rs`, the NGINX scale and
    # mixed gossip scripts) only exercise here — main must not silently
    # regress.
    - cron: '0 8 * * 1'

concurrency:
  group: kubernetes-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# `packages: read` lets the image-building jobs pull the private GHCR
# buildcache as a read-only `cache-from` source. Fork PRs can't read
# packages — their import misses and the build cold-compiles (today's
# behavior).
permissions:
  contents: read
  packages: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_PROFILE_TEST_DEBUG: 0

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      kube-smoke: ${{ steps.surfaces.outputs.kube_smoke }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: loadingalias/cargo-rail-action@v4
        id: rail
        with:
          mode: minimal
      # cargo-rail-action v4.1.3 emits the built-in surface outputs
      # (`build`, `test`, …) but doesn't actually expose `custom_<name>`
      # outputs even though its README claims it does — they're never
      # declared in `outputs:` so GitHub Actions filters them out. Read
      # them out of `scope-json` ourselves with jq.
      - id: surfaces
        env:
          SCOPE_JSON: ${{ steps.rail.outputs.scope-json }}
        run: |
          set -eu
          val=$(printf '%s' "$SCOPE_JSON" | jq -r '.surfaces["custom:kube_smoke"] // false')
          echo "kube_smoke=$val" >> "$GITHUB_OUTPUT"

  # Each k8s job spins its own kind cluster. They cannot share one — the
  # smoke scripts create / delete namespaces named after the parent
  # process pid and assume exclusive access.
  kubernetes-test:
    needs: plan
    if: needs.plan.outputs.kube-smoke == 'true' || github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: baptiste0928/cargo-install@v3
        with:
          crate: cargo-nextest
          locked: true
      - uses: helm/kind-action@v1
        with:
          cluster_name: gabion
          wait: 120s
      - run: make kubernetes-test

  kubernetes-nginx-test:
    needs: plan
    if: needs.plan.outputs.kube-smoke == 'true' || github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      # Best-effort GHCR login so the buildx cache-from steps can read the
      # private buildcache; forks miss and cold-compile (continue-on-error).
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        continue-on-error: true
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: helm/kind-action@v1
        with:
          cluster_name: gabion
          wait: 120s
      # Cores from pods inside kind land in their own mount namespace at
      # /tmp/cores. The cleanup hook in `nginx-scale-rate-limit.sh`
      # best-effort-copies them out via `kubectl cp` into the runner's
      # /tmp/cores; the upload-artifact step picks them up on failure.
      # Setting `kernel.core_pattern` here matches the smoke containers
      # built with `--ulimit core=-1` so cores actually get written.
      - name: enable host core dumps
        run: |
          sudo mkdir -p /tmp/cores
          sudo chmod 1777 /tmp/cores
          sudo sysctl -w kernel.core_pattern='/tmp/cores/core.%e.%p'
      # Pre-build the NGINX module image so `kind load docker-image` can
      # ship it into the cluster's containerd. `--cache-from` warms the
      # cargo-chef cook layer from docker.yml's canonical `build` cache
      # (read-only; a miss degrades to today's cold build). Tagged as the
      # compose `<project>-<service>` name so `kind load` and the smoke
      # script's no-op rebuild both find it.
      - name: build NGINX module image
        run: |
          docker buildx build \
            --load \
            --target smoke \
            --build-arg NGINX_BASE_IMAGE=nginx:stable-alpine \
            --cache-from type=registry,ref=ghcr.io/${{ github.repository }}/nginx:buildcache-nginx-stable-alpine-amd64 \
            -f deploy/nginx/Dockerfile \
            -t nginx-nginx-module-request-smoke:latest \
            .
      - name: load image into kind
        run: kind load docker-image nginx-nginx-module-request-smoke:latest --name gabion
      - run: make kubernetes-nginx-test
      # Cores copied out by `kubectl cp` (or written by root-owned
      # smokes via the host's core_pattern) may be read-locked against
      # the runner user. Relax perms so upload-artifact can zip them.
      - name: relax core perms for upload
        if: failure()
        run: sudo chmod -R a+r /tmp/cores 2>/dev/null || true
      - name: upload cores on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cores-${{ github.job }}-${{ github.run_attempt }}
          path: /tmp/cores
          if-no-files-found: ignore

  kubernetes-mixed-test:
    needs: plan
    if: needs.plan.outputs.kube-smoke == 'true' || github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      # Best-effort GHCR login so the buildx cache-from steps can read the
      # private buildcache; forks miss and cold-compile (continue-on-error).
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        continue-on-error: true
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: helm/kind-action@v1
        with:
          cluster_name: gabion
          wait: 120s
      - name: enable host core dumps
        run: |
          sudo mkdir -p /tmp/cores
          sudo chmod 1777 /tmp/cores
          sudo sysctl -w kernel.core_pattern='/tmp/cores/core.%e.%p'
      # Warm both smoke images from their canonical `build` caches
      # (read-only; a miss degrades to today's cold build). `docker build`
      # can't consume a registry cache, so use `docker buildx build
      # --load`. Tagged as the names `kind load` + the smoke scripts expect.
      - name: build images
        run: |
          docker buildx build \
            --load \
            --target smoke \
            --build-arg NGINX_BASE_IMAGE=nginx:stable-alpine \
            --cache-from type=registry,ref=ghcr.io/${{ github.repository }}/nginx:buildcache-nginx-stable-alpine-amd64 \
            -f deploy/nginx/Dockerfile \
            -t nginx-nginx-module-request-smoke:latest \
            .
          docker buildx build \
            --load \
            --cache-from type=registry,ref=ghcr.io/${{ github.repository }}/gabiond:buildcache-gabiond-default-amd64 \
            -f deploy/gabiond/Dockerfile \
            -t gabiond:local \
            .
      - name: load images into kind
        run: |
          kind load docker-image nginx-nginx-module-request-smoke:latest --name gabion
          kind load docker-image gabiond:local --name gabion
      - run: make kubernetes-mixed-test
      # Cores copied out by `kubectl cp` (or written by root-owned
      # smokes via the host's core_pattern) may be read-locked against
      # the runner user. Relax perms so upload-artifact can zip them.
      - name: relax core perms for upload
        if: failure()
        run: sudo chmod -R a+r /tmp/cores 2>/dev/null || true
      - name: upload cores on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cores-${{ github.job }}-${{ github.run_attempt }}
          path: /tmp/cores
          if-no-files-found: ignore

  kubernetes-gossip-bench:
    needs: plan
    if: needs.plan.outputs.kube-smoke == 'true' || github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      # Best-effort GHCR login so the buildx cache-from steps can read the
      # private buildcache; forks miss and cold-compile (continue-on-error).
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        continue-on-error: true
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - uses: helm/kind-action@v1
        with:
          cluster_name: gabion
          wait: 120s
      - name: enable host core dumps
        run: |
          sudo mkdir -p /tmp/cores
          sudo chmod 1777 /tmp/cores
          sudo sysctl -w kernel.core_pattern='/tmp/cores/core.%e.%p'
      # Warm both smoke images from their canonical `build` caches
      # (read-only; a miss degrades to today's cold build). `docker build`
      # can't consume a registry cache, so use `docker buildx build
      # --load`. Tagged as the names `kind load` + the smoke scripts expect.
      - name: build images
        run: |
          docker buildx build \
            --load \
            --target smoke \
            --build-arg NGINX_BASE_IMAGE=nginx:stable-alpine \
            --cache-from type=registry,ref=ghcr.io/${{ github.repository }}/nginx:buildcache-nginx-stable-alpine-amd64 \
            -f deploy/nginx/Dockerfile \
            -t nginx-nginx-module-request-smoke:latest \
            .
          docker buildx build \
            --load \
            --cache-from type=registry,ref=ghcr.io/${{ github.repository }}/gabiond:buildcache-gabiond-default-amd64 \
            -f deploy/gabiond/Dockerfile \
            -t gabiond:local \
            .
      - name: load images into kind
        run: |
          kind load docker-image nginx-nginx-module-request-smoke:latest --name gabion
          kind load docker-image gabiond:local --name gabion
      - run: make kubernetes-gossip-bench
      # Cores copied out by `kubectl cp` (or written by root-owned
      # smokes via the host's core_pattern) may be read-locked against
      # the runner user. Relax perms so upload-artifact can zip them.
      - name: relax core perms for upload
        if: failure()
        run: sudo chmod -R a+r /tmp/cores 2>/dev/null || true
      - name: upload cores on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cores-${{ github.job }}-${{ github.run_attempt }}
          path: /tmp/cores
          if-no-files-found: ignore
