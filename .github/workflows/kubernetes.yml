name: kubernetes

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    # Weekly kind-cluster smoke on main. The k8s code paths
    # (`crates/gabion/src/discovery/kubernetes.rs`, the NGINX scale and
    # mixed gossip scripts) only exercise here — main must not silently
    # regress.
    - cron: '0 8 * * 1'

concurrency:
  group: kubernetes-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_PROFILE_TEST_DEBUG: 0

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      kube-smoke: ${{ steps.surfaces.outputs.kube_smoke }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: loadingalias/cargo-rail-action@v4
        id: rail
        with:
          mode: minimal
      # cargo-rail-action v4.1.3 emits the built-in surface outputs
      # (`build`, `test`, …) but doesn't actually expose `custom_<name>`
      # outputs even though its README claims it does — they're never
      # declared in `outputs:` so GitHub Actions filters them out. Read
      # them out of `scope-json` ourselves with jq.
      - id: surfaces
        env:
          SCOPE_JSON: ${{ steps.rail.outputs.scope-json }}
        run: |
          set -eu
          val=$(printf '%s' "$SCOPE_JSON" | jq -r '.surfaces["custom:kube_smoke"] // false')
          echo "kube_smoke=$val" >> "$GITHUB_OUTPUT"

  # Each k8s job spins its own kind cluster. They cannot share one — the
  # smoke scripts create / delete namespaces named after the parent
  # process pid and assume exclusive access.
  kubernetes-test:
    needs: plan
    if: needs.plan.outputs.kube-smoke == 'true' || github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Prebuilt nextest — cargo-install compiles it from source on a
      # cache miss; install-action fetches the release binary.
      - uses: taiki-e/install-action@v2
        with:
          tool: nextest
      - uses: helm/kind-action@v1
        with:
          cluster_name: gabion
          wait: 120s
      - run: make kubernetes-test

  kubernetes-nginx-test:
    needs: plan
    if: needs.plan.outputs.kube-smoke == 'true' || github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - uses: helm/kind-action@v1
        with:
          cluster_name: gabion
          wait: 120s
      # Cores from pods inside kind land in their own mount namespace at
      # /tmp/cores. The cleanup hook in `nginx-scale-rate-limit.sh`
      # best-effort-copies them out via `kubectl cp` into the runner's
      # /tmp/cores; the upload-artifact step picks them up on failure.
      # Setting `kernel.core_pattern` here matches the smoke containers
      # built with `--ulimit core=-1` so cores actually get written.
      - name: enable host core dumps
        run: |
          sudo mkdir -p /tmp/cores
          sudo chmod 1777 /tmp/cores
          sudo sysctl -w kernel.core_pattern='/tmp/cores/core.%e.%p'
      # Pre-build the NGINX module image so `kind load docker-image` can
      # ship it into the cluster's containerd. The script itself rebuilds
      # the same compose target — that becomes a cache no-op.
      - name: build NGINX module image
        env:
          DOCKER_BUILDKIT: '1'
          COMPOSE_DOCKER_CLI_BUILD: '1'
        run: docker compose --profile module -f deploy/nginx/docker-compose.yml build nginx-module-request-smoke
      - name: load image into kind
        run: kind load docker-image nginx-nginx-module-request-smoke:latest --name gabion
      - run: make kubernetes-nginx-test
      # Cores copied out by `kubectl cp` (or written by root-owned
      # smokes via the host's core_pattern) may be read-locked against
      # the runner user. Relax perms so upload-artifact can zip them.
      - name: relax core perms for upload
        if: failure()
        run: sudo chmod -R a+r /tmp/cores 2>/dev/null || true
      - name: upload cores on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cores-${{ github.job }}-${{ github.run_attempt }}
          path: /tmp/cores
          if-no-files-found: ignore

  kubernetes-mixed-test:
    needs: plan
    if: needs.plan.outputs.kube-smoke == 'true' || github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - uses: helm/kind-action@v1
        with:
          cluster_name: gabion
          wait: 120s
      - name: enable host core dumps
        run: |
          sudo mkdir -p /tmp/cores
          sudo chmod 1777 /tmp/cores
          sudo sysctl -w kernel.core_pattern='/tmp/cores/core.%e.%p'
      - name: build images
        env:
          DOCKER_BUILDKIT: '1'
          COMPOSE_DOCKER_CLI_BUILD: '1'
        run: |
          docker compose --profile module -f deploy/nginx/docker-compose.yml build nginx-module-request-smoke
          docker build -f deploy/gabiond/Dockerfile -t gabiond:local .
      - name: load images into kind
        run: |
          kind load docker-image nginx-nginx-module-request-smoke:latest --name gabion
          kind load docker-image gabiond:local --name gabion
      - run: make kubernetes-mixed-test
      # Cores copied out by `kubectl cp` (or written by root-owned
      # smokes via the host's core_pattern) may be read-locked against
      # the runner user. Relax perms so upload-artifact can zip them.
      - name: relax core perms for upload
        if: failure()
        run: sudo chmod -R a+r /tmp/cores 2>/dev/null || true
      - name: upload cores on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cores-${{ github.job }}-${{ github.run_attempt }}
          path: /tmp/cores
          if-no-files-found: ignore

  kubernetes-gossip-bench:
    needs: plan
    if: needs.plan.outputs.kube-smoke == 'true' || github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - uses: helm/kind-action@v1
        with:
          cluster_name: gabion
          wait: 120s
      - name: enable host core dumps
        run: |
          sudo mkdir -p /tmp/cores
          sudo chmod 1777 /tmp/cores
          sudo sysctl -w kernel.core_pattern='/tmp/cores/core.%e.%p'
      - name: build images
        env:
          DOCKER_BUILDKIT: '1'
          COMPOSE_DOCKER_CLI_BUILD: '1'
        run: |
          docker compose --profile module -f deploy/nginx/docker-compose.yml build nginx-module-request-smoke
          docker build -f deploy/gabiond/Dockerfile -t gabiond:local .
      - name: load images into kind
        run: |
          kind load docker-image nginx-nginx-module-request-smoke:latest --name gabion
          kind load docker-image gabiond:local --name gabion
      - run: make kubernetes-gossip-bench
      # Cores copied out by `kubectl cp` (or written by root-owned
      # smokes via the host's core_pattern) may be read-locked against
      # the runner user. Relax perms so upload-artifact can zip them.
      - name: relax core perms for upload
        if: failure()
        run: sudo chmod -R a+r /tmp/cores 2>/dev/null || true
      - name: upload cores on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cores-${{ github.job }}-${{ github.run_attempt }}
          path: /tmp/cores
          if-no-files-found: ignore
